<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>ToDoMax - Nutrition</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="icon.png" alt="" class="brand-mark" />
        <h1>ToDoMax</h1>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="index.html" class="icon-link" aria-label="Tasks">&#9989;</a>
          <a href="nutrition.html" class="icon-link active" aria-label="Nutrition">&#127822;</a>
          <a href="training.html" class="icon-link" aria-label="Training">&#127947;</a>
          <a href="wellness.html" class="icon-link" aria-label="Wellness">&#129496;</a>
          <a href="goals.html" class="icon-link" aria-label="Goals">&#127919;</a>
        </nav>
        <button id="logout">Log out</button>
      </div>
    </header>
    <section class="hero">
      <div class="hero-date-nav">
        <button type="button" id="prev-day" aria-label="Previous day">&lsaquo;</button>
        <div class="hero-date" id="hero-date"></div>
        <button type="button" id="next-day" aria-label="Next day">&rsaquo;</button>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
      <button type="button" id="set-target" class="link-button">Set goal</button>
    </section>
    <div id="calorie-trend" class="trend-card hidden"></div>
    <nav class="tabs" id="view-tabs">
      <button data-view="today" class="active">Today</button>
      <button data-view="foods">Foods</button>
      <button data-view="meals">Meals</button>
    </nav>
    <main>
      <p id="empty-state" class="empty-state">Loading...</p>
      <ul id="item-list" class="task-list"></ul>
    </main>
    <button id="new-item" class="fab">+</button>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="log-form" class="modal hidden">
      <h2 id="log-modal-title">Log food</h2>
      <div class="row">
        <button type="button" data-source="food" class="source-toggle active">Food</button>
        <button type="button" data-source="meal" class="source-toggle">Meal</button>
      </div>
      <label>Which one
        <input id="log-source-input" list="log-source-options" placeholder="Type to search..." autocomplete="off" required />
        <datalist id="log-source-options"></datalist>
      </label>
      <div class="row">
        <label>Servings
          <input name="servings" type="number" min="0.1" step="0.1" value="1" required />
        </label>
        <label>Date
          <input name="log_date" type="date" required />
        </label>
      </div>
      <div class="actions">
        <button type="button" id="delete-entry" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Log it</button>
      </div>
    </form>

    <form id="food-form" class="modal hidden">
      <h2 id="food-modal-title">New food</h2>
      <label>Name
        <input name="name" required maxlength="200" />
      </label>
      <label>Serving label
        <input name="serving_label" placeholder="e.g. 100g, 1 cup" maxlength="40" />
      </label>
      <div class="row">
        <label>Calories
          <input name="calories" type="number" min="0" step="1" value="0" />
        </label>
        <label>Protein (g)
          <input name="protein_g" type="number" min="0" step="0.1" value="0" />
        </label>
      </div>
      <div class="row">
        <label>Carbs (g)
          <input name="carbs_g" type="number" min="0" step="0.1" value="0" />
        </label>
        <label>Fat (g)
          <input name="fat_g" type="number" min="0" step="0.1" value="0" />
        </label>
      </div>
      <div class="actions">
        <button type="button" id="delete-food" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>

    <form id="meal-form" class="modal hidden">
      <h2 id="meal-modal-title">New meal</h2>
      <label>Name
        <input name="name" required maxlength="200" />
      </label>
      <div id="meal-items"></div>
      <datalist id="meal-item-foods"></datalist>
      <button type="button" id="add-meal-item">+ Add food</button>
      <div class="actions">
        <button type="button" id="delete-meal" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>

    <form id="target-form" class="modal hidden">
      <h2>Daily nutrition goal</h2>
      <p class="modal-hint">All optional - leave blank to skip a target.</p>
      <div class="row">
        <label>Calories
          <input name="calories" type="number" min="0" step="1" />
        </label>
        <label>Protein (g)
          <input name="protein_g" type="number" min="0" step="1" />
        </label>
      </div>
      <div class="row">
        <label>Carbs (g)
          <input name="carbs_g" type="number" min="0" step="1" />
        </label>
        <label>Fat (g)
          <input name="fat_g" type="number" min="0" step="1" />
        </label>
      </div>
      <div class="actions">
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";
    import { requireSession } from "./js/auth-guard.js";

    await requireSession();

    document.getElementById("logout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.replace("login.html");
    });
  </script>
  <script type="module" src="js/nutrition.js"></script>
</body>
</html>
