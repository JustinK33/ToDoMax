<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>ToDoMax</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="icon.png" alt="" class="brand-mark" />
        <h1>ToDoMax</h1>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="index.html" class="icon-link active" aria-label="Tasks">&#9989;</a>
          <a href="nutrition.html" class="icon-link" aria-label="Nutrition">&#127822;</a>
          <a href="training.html" class="icon-link" aria-label="Training">&#127947;</a>
          <a href="wellness.html" class="icon-link" aria-label="Wellness">&#129496;</a>
          <a href="goals.html" class="icon-link" aria-label="Goals">&#127919;</a>
        </nav>
        <button id="logout">Log out</button>
      </div>
    </header>
    <section class="hero">
      <div class="hero-date" id="hero-date"></div>
      <div class="hero-stats" id="hero-stats"></div>
    </section>
    <section id="dashboard-today" class="dashboard-row"></section>
    <div id="weekly-review" class="week-summary hidden"></div>
    <nav class="tabs" id="view-tabs">
      <button data-view="today" class="active">Today</button>
      <button data-view="week">Week</button>
      <button data-view="overdue">Overdue</button>
      <button data-view="upcoming">Upcoming</button>
      <button data-view="all">All</button>
    </nav>
    <div class="category-filter">
      <select id="category-select">
        <option value="">All categories</option>
      </select>
    </div>
    <div id="week-summary" class="week-summary hidden"></div>
    <div id="week-days" class="week-days hidden"></div>
    <main>
      <p id="empty-state" class="empty-state">Loading...</p>
      <ul id="task-list" class="task-list"></ul>
    </main>
    <button id="new-task" class="fab">+</button>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="task-form" class="modal">
      <h2 id="modal-title">New task</h2>
      <div id="habit-presets" class="habit-presets"></div>
      <label>Title
        <input name="title" required maxlength="200" />
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="row">
        <label>Category
          <select id="category-input">
            <option value="">No category</option>
            <option>Health</option>
            <option>Study</option>
            <option>Fitness</option>
            <option>Personal</option>
            <option>Work</option>
            <option value="__other">Other...</option>
          </select>
        </label>
        <input name="category_other" id="category-other" class="hidden" placeholder="Category name" aria-label="Category name" maxlength="40" />
      </div>
      <div class="row">
        <label>Due date
          <input name="due_date" type="date" />
        </label>
        <label>Due time
          <input name="due_time" type="time" />
        </label>
      </div>
      <label>Repeat
        <select name="recurrence_type" id="recurrence-type">
          <option value="none">Never</option>
          <option value="daily">Every day</option>
          <option value="weekly">Specific days</option>
        </select>
      </label>
      <div id="recurrence-days" class="weekday-picker hidden">
        <button type="button" data-day="1">Mon</button>
        <button type="button" data-day="2">Tue</button>
        <button type="button" data-day="3">Wed</button>
        <button type="button" data-day="4">Thu</button>
        <button type="button" data-day="5">Fri</button>
        <button type="button" data-day="6">Sat</button>
        <button type="button" data-day="7">Sun</button>
        <button type="button" id="preset-weekdays" class="preset">Weekdays</button>
      </div>
      <div class="row">
        <label>Remind me
          <select id="reminder-preset">
            <option value="">No reminder</option>
            <option value="10">10 minutes before</option>
            <option value="30">30 minutes before</option>
            <option value="60">1 hour before</option>
            <option value="1440">1 day before</option>
            <option value="custom">Custom...</option>
          </select>
        </label>
        <input type="number" id="reminder-custom" class="hidden" min="1" placeholder="Minutes before" />
      </div>
      <div class="actions">
        <button type="button" id="delete-task" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" id="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";
    import { requireSession } from "./js/auth-guard.js";

    await requireSession();

    document.getElementById("logout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.replace("login.html");
    });
  </script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
