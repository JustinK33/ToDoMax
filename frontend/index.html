<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>ToDoMax</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="icon.png" alt="" class="brand-mark" />
        <h1>ToDoMax</h1>
      </div>
      <button id="logout">Log out</button>
    </header>
    <main>
      <p id="empty-state" class="empty-state hidden">No tasks yet. Tap + to add one.</p>
      <ul id="task-list" class="task-list"></ul>
    </main>
    <button id="new-task" class="fab">+</button>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="task-form" class="modal">
      <h2 id="modal-title">New task</h2>
      <label>Title
        <input name="title" required maxlength="200" />
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="row">
        <label>Category
          <input name="category" placeholder="e.g. health" />
        </label>
      </div>
      <div class="row">
        <label>Due date
          <input name="due_date" type="date" />
        </label>
        <label>Due time
          <input name="due_time" type="time" />
        </label>
      </div>
      <div class="actions">
        <button type="button" id="delete-task" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" id="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";
    import { requireSession } from "./js/auth-guard.js";

    await requireSession();

    document.getElementById("logout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.replace("login.html");
    });
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
