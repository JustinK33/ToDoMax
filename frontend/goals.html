<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>ToDoMax - Goals</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="icon.png" alt="" class="brand-mark" />
        <h1>ToDoMax</h1>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="index.html" class="icon-link" aria-label="Tasks">&#9989;</a>
          <a href="nutrition.html" class="icon-link" aria-label="Nutrition">&#127822;</a>
          <a href="goals.html" class="icon-link active" aria-label="Goals">&#127919;</a>
        </nav>
        <button id="logout">Log out</button>
      </div>
    </header>
    <main>
      <p id="empty-state" class="empty-state">Loading...</p>
      <ul id="goal-list" class="task-list"></ul>
    </main>
    <button id="new-goal" class="fab">+</button>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="goal-form" class="modal">
      <h2 id="modal-title">New goal</h2>
      <label>Title
        <input name="title" required maxlength="200" />
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="row">
        <label>Timeframe
          <select name="timeframe" required>
            <option value="week">Week</option>
            <option value="month">Month</option>
            <option value="year">Year</option>
            <option value="lifetime">Lifetime</option>
          </select>
        </label>
        <label>Target date (optional)
          <input name="target_date" type="date" />
        </label>
      </div>
      <div class="actions">
        <button type="button" id="delete-goal" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" id="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";
    import { requireSession } from "./js/auth-guard.js";

    await requireSession();

    document.getElementById("logout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.replace("login.html");
    });
  </script>
  <script type="module" src="js/goals.js"></script>
</body>
</html>
