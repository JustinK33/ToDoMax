<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>ToDoMax - Wellness</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="icon.png" alt="" class="brand-mark" />
        <h1>ToDoMax</h1>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="index.html" class="icon-link" aria-label="Tasks">&#9989;</a>
          <a href="nutrition.html" class="icon-link" aria-label="Nutrition">&#127822;</a>
          <a href="training.html" class="icon-link" aria-label="Training">&#127947;</a>
          <a href="wellness.html" class="icon-link active" aria-label="Wellness">&#129496;</a>
          <a href="goals.html" class="icon-link" aria-label="Goals">&#127919;</a>
        </nav>
        <button id="logout">Log out</button>
      </div>
    </header>
    <section class="hero">
      <div class="hero-date" id="hero-date"></div>
      <div class="hero-stats" id="hero-stats"></div>
    </section>
    <div id="weight-trend" class="trend-card hidden"></div>
    <nav class="tabs" id="view-tabs">
      <button data-view="body" class="active">Body</button>
      <button data-view="sleep">Sleep</button>
      <button data-view="mood">Mood</button>
      <button data-view="habits">Habits</button>
    </nav>
    <main>
      <p id="empty-state" class="empty-state">Loading...</p>
      <ul id="item-list" class="task-list"></ul>
    </main>
    <button id="new-item" class="fab">+</button>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="body-form" class="modal hidden">
      <h2 id="body-modal-title">New weigh-in</h2>
      <label>Weight
        <input name="weight" type="number" min="0" step="0.1" required />
      </label>
      <label>Date
        <input name="log_date" type="date" required />
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="actions">
        <button type="button" id="delete-body-metric" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>

    <form id="sleep-form" class="modal hidden">
      <h2 id="sleep-modal-title">New sleep log</h2>
      <div class="row">
        <label>Hours
          <input name="hours" type="number" min="0" max="24" step="0.1" required />
        </label>
        <label>Quality (1-5)
          <select name="quality">
            <option value="">-</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>
      </div>
      <label>Date
        <input name="log_date" type="date" required />
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="actions">
        <button type="button" id="delete-sleep-log" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>

    <form id="mood-form" class="modal hidden">
      <h2 id="mood-modal-title">New mood log</h2>
      <label>Mood (1-5)
        <select name="mood" required>
          <option value="1">1 - Rough</option>
          <option value="2">2</option>
          <option value="3" selected>3 - Okay</option>
          <option value="4">4</option>
          <option value="5">5 - Great</option>
        </select>
      </label>
      <label>Date
        <input name="log_date" type="date" required />
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="actions">
        <button type="button" id="delete-mood-log" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";
    import { requireSession } from "./js/auth-guard.js";

    await requireSession();

    document.getElementById("logout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.replace("login.html");
    });
  </script>
  <script type="module" src="js/wellness.js"></script>
</body>
</html>
