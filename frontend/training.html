<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>ToDoMax - Training</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="icon.png" alt="" class="brand-mark" />
        <h1>ToDoMax</h1>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="index.html" class="icon-link" aria-label="Tasks">&#9989;</a>
          <a href="nutrition.html" class="icon-link" aria-label="Nutrition">&#127822;</a>
          <a href="training.html" class="icon-link active" aria-label="Training">&#127947;</a>
          <a href="goals.html" class="icon-link" aria-label="Goals">&#127919;</a>
        </nav>
        <button id="logout">Log out</button>
      </div>
    </header>
    <section class="hero">
      <div class="hero-date" id="hero-date"></div>
      <div class="hero-stats" id="hero-stats"></div>
    </section>
    <nav class="tabs" id="view-tabs">
      <button data-view="today" class="active">Today</button>
      <button data-view="exercises">Exercises</button>
    </nav>
    <main>
      <div id="pr-list" class="pr-list hidden"></div>
      <p id="empty-state" class="empty-state">Loading...</p>
      <ul id="item-list" class="task-list"></ul>
    </main>
    <button id="new-item" class="fab">+</button>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="set-form" class="modal hidden">
      <h2>Log set</h2>
      <label>Exercise
        <select name="exercise_id" required></select>
      </label>
      <div class="row">
        <label>Weight
          <input name="weight" type="number" min="0" step="0.5" required />
        </label>
        <label>Reps
          <input name="reps" type="number" min="1" step="1" required />
        </label>
      </div>
      <div class="row">
        <label>RPE
          <input name="rpe" type="number" min="1" max="10" step="0.5" />
        </label>
        <label>Date
          <input name="performed_on" type="date" required />
        </label>
      </div>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="actions">
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>

    <form id="exercise-form" class="modal hidden">
      <h2 id="exercise-modal-title">New exercise</h2>
      <label>Name
        <input name="name" required maxlength="120" />
      </label>
      <label>Category
        <select name="category">
          <option>Strength</option>
          <option>Push</option>
          <option>Pull</option>
          <option>Legs</option>
          <option>Core</option>
          <option>Conditioning</option>
        </select>
      </label>
      <label>Notes
        <textarea name="notes" rows="2"></textarea>
      </label>
      <div class="actions">
        <button type="button" id="delete-exercise" class="hidden">Delete</button>
        <span style="flex:1"></span>
        <button type="button" class="cancel-modal">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";
    import { requireSession } from "./js/auth-guard.js";

    await requireSession();

    document.getElementById("logout").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.replace("login.html");
    });
  </script>
  <script type="module" src="js/training.js"></script>
</body>
</html>
