server {
  listen 80;
  root /usr/share/nginx/html;

  # Serves /login the same as /login.html - this is a multi-page static
  # site (no router), so falling back to the .html file for an
  # extensionless path is just a convenience, not a redirect.
  location / {
    try_files $uri $uri.html $uri/ =404;
  }
}
